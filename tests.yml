name: TestPilot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Permet de lancer manuellement
  workflow_dispatch:
  # Lancer chaque jour à 8h UTC
  schedule:
    - cron: '0 8 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests API
        run: python testpilot.py

      - name: Publier le rapport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testpilot-report
          path: |
            dashboard.html
            results.json
            historique.json
