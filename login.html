<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome back!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      flex: 1;
      background-color: #e8e4f0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .characters {
      position: relative;
      width: 280px;
      height: 280px;
    }

    /* Orange circle (bottom-left) */
    .char-orange {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 140px;
      height: 140px;
      background: #f4692b;
      border-radius: 50%;
      animation: float1 3s ease-in-out infinite;
    }
    .char-orange::before,
    .char-orange::after {
      content: '';
      position: absolute;
      background: #1a1a1a;
      border-radius: 50%;
      width: 12px;
      height: 12px;
      top: 45px;
    }
    .char-orange::before { left: 38px; }
    .char-orange::after  { left: 62px; }
    /* smile */
    .char-orange .smile {
      position: absolute;
      bottom: 32px;
      left: 30px;
      width: 50px;
      height: 22px;
      border: 3px solid #1a1a1a;
      border-top: none;
      border-radius: 0 0 40px 40px;
    }

    /* Yellow blob (bottom-center) */
    .char-yellow {
      position: absolute;
      bottom: 0;
      left: 110px;
      width: 90px;
      height: 120px;
      background: #f5c842;
      border-radius: 50px 50px 40px 40px;
      animation: float2 3.4s ease-in-out infinite;
    }
    .char-yellow::before,
    .char-yellow::after {
      content: '';
      position: absolute;
      background: #1a1a1a;
      border-radius: 50%;
      width: 9px;
      height: 9px;
      top: 42px;
    }
    .char-yellow::before { left: 26px; }
    .char-yellow::after  { left: 50px; }
    .char-yellow .mouth {
      position: absolute;
      bottom: 28px;
      left: 22px;
      width: 30px;
      height: 3px;
      background: #1a1a1a;
      border-radius: 2px;
    }

    /* Dark rectangle (center) */
    .char-dark {
      position: absolute;
      bottom: 60px;
      left: 155px;
      width: 65px;
      height: 130px;
      background: #1a1a1a;
      border-radius: 8px 8px 4px 4px;
      animation: float3 2.8s ease-in-out infinite;
    }
    .char-dark::before,
    .char-dark::after {
      content: '';
      position: absolute;
      background: #e8e4f0;
      border-radius: 50%;
      width: 9px;
      height: 9px;
      top: 38px;
    }
    .char-dark::before { left: 14px; }
    .char-dark::after  { left: 36px; }

    /* Purple rectangle (tallest, back) */
    .char-purple {
      position: absolute;
      bottom: 80px;
      left: 60px;
      width: 80px;
      height: 180px;
      background: #6b4fd4;
      border-radius: 10px 10px 5px 5px;
      animation: float4 3.2s ease-in-out infinite;
    }
    .char-purple::before,
    .char-purple::after {
      content: '';
      position: absolute;
      background: #1a1a1a;
      border-radius: 50%;
      width: 10px;
      height: 10px;
      top: 50px;
    }
    .char-purple::before { left: 20px; }
    .char-purple::after  { left: 44px; }

    @keyframes float1 {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-14px) rotate(2deg); }
    }
    @keyframes float3 {
      0%, 100% { transform: translateY(0) rotate(1deg); }
      50%       { transform: translateY(-8px) rotate(-1deg); }
    }
    @keyframes float4 {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%       { transform: translateY(-12px) rotate(2deg); }
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      flex: 1;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .form-container {
      width: 100%;
      max-width: 360px;
    }

    .plus-icon {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 28px;
      display: block;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid #d0d0d0;
      padding: 8px 0;
      font-size: 14px;
      color: #1a1a1a;
      background: transparent;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-bottom-color: #1a1a1a;
    }

    .field input::placeholder {
      color: #bbb;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 28px;
    }

    .toggle-pw {
      position: absolute;
      right: 0;
      bottom: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      padding: 0;
      font-size: 16px;
      line-height: 1;
    }

    .toggle-pw:hover { color: #1a1a1a; }

    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      font-size: 12px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #555;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #1a1a1a;
      cursor: pointer;
    }

    .forgot {
      color: #888;
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s;
    }

    .forgot:hover { color: #1a1a1a; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 12px;
    }

    .btn-login:hover  { background: #333; }
    .btn-login:active { transform: scale(0.98); }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #1a1a1a;
      border: 1.5px solid #d0d0d0;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 32px;
    }

    .btn-google:hover {
      background: #f5f5f5;
      border-color: #bbb;
    }

    .google-icon {
      width: 18px;
      height: 18px;
    }

    .signup-row {
      text-align: center;
      font-size: 13px;
      color: #888;
    }

    .signup-row a {
      color: #1a1a1a;
      font-weight: 600;
      text-decoration: none;
    }

    .signup-row a:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      body { flex-direction: column; }
      .left-panel {
        flex: 0 0 220px;
        border-radius: 0 0 32px 32px;
      }
      .characters {
        width: 200px;
        height: 200px;
        transform: scale(0.75);
        transform-origin: center bottom;
      }
      .right-panel { flex: 1; }
    }
  </style>
</head>
<body>

  <!-- LEFT: illustration -->
  <div class="left-panel">
    <div class="characters">
      <!-- orange circle -->
      <div class="char-orange">
        <div class="smile"></div>
      </div>
      <!-- yellow blob -->
      <div class="char-yellow">
        <div class="mouth"></div>
      </div>
      <!-- dark rectangle -->
      <div class="char-dark"></div>
      <!-- purple rectangle (tallest) -->
      <div class="char-purple"></div>
    </div>
  </div>

  <!-- RIGHT: form -->
  <div class="right-panel">
    <div class="form-container">
      <span class="plus-icon">✦</span>
      <h1>Welcome back!</h1>
      <p class="subtitle">Please enter your details</p>

      <form onsubmit="handleLogin(event)">
        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="anna@gmail.com"
            autocomplete="email"
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              id="password"
              type="password"
              placeholder="••••••••••"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="toggle-pw"
              aria-label="Toggle password visibility"
              onclick="togglePassword()"
            >
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="options-row">
          <label class="remember">
            <input type="checkbox" id="remember" />
            Remember for 30 days
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">Log in</button>

        <button type="button" class="btn-google" onclick="handleGoogleLogin()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Log in with Google
        </button>
      </form>

      <p class="signup-row">
        Don't have an account? <a href="#">Sign Up</a>
      </p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      const isHidden = input.type === 'password';

      input.type = isHidden ? 'text' : 'password';

      icon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) return;
      alert(`Connexion en cours pour ${email}…`);
    }

    function handleGoogleLogin() {
      alert('Redirection vers Google OAuth…');
    }
  </script>
</body>
</html>
