# ============================================
# TestPilot - Tests JokeAPI (v2.jokeapi.dev)
# ============================================

- nom: "Récupérer une blague aléatoire"
  url: "https://v2.jokeapi.dev/joke/Any"
  methode: GET
  attendu:
    status: 200
    temps_max: 3
    contient:
      error: false

- nom: "Blague de programmation"
  url: "https://v2.jokeapi.dev/joke/Programming"
  methode: GET
  attendu:
    status: 200
    temps_max: 3
    contient:
      error: false

- nom: "Blague en mode safe (sans contenu offensant)"
  url: "https://v2.jokeapi.dev/joke/Any?safe-mode"
  methode: GET
  attendu:
    status: 200
    temps_max: 3
    contient:
      error: false

- nom: "Blague de type single"
  url: "https://v2.jokeapi.dev/joke/Any?type=single"
  methode: GET
  attendu:
    status: 200
    temps_max: 3
    contient:
      error: false
      type: single

- nom: "Catégorie invalide retourne une erreur"
  url: "https://v2.jokeapi.dev/joke/CategorieInexistante"
  methode: GET
  attendu:
    status: 400
    temps_max: 3

- nom: "Blague en français"
  url: "https://v2.jokeapi.dev/joke/Any?lang=fr"
  methode: GET
  attendu:
    status: 200
    temps_max: 3
    contient:
      error: false

# ============================================
# TestPilot - Tests Open-Meteo (open-meteo.com)
# ============================================

- nom: "Météo actuelle à Montréal"
  url: "https://api.open-meteo.com/v1/forecast?latitude=45.5017&longitude=-73.5673&current_weather=true"
  methode: GET
  attendu:
    status: 200
    temps_max: 3

- nom: "Prévisions sur 7 jours à Paris"
  url: "https://api.open-meteo.com/v1/forecast?latitude=48.8566&longitude=2.3522&daily=temperature_2m_max,temperature_2m_min&timezone=Europe/Paris"
  methode: GET
  attendu:
    status: 200
    temps_max: 3

- nom: "Météo horaire à Québec"
  url: "https://api.open-meteo.com/v1/forecast?latitude=46.8139&longitude=-71.2080&hourly=temperature_2m&timezone=America/Toronto"
  methode: GET
  attendu:
    status: 200
    temps_max: 3

- nom: "Latitude invalide retourne une erreur"
  url: "https://api.open-meteo.com/v1/forecast?latitude=999&longitude=999"
  methode: GET
  attendu:
    status: 400
    temps_max: 3
