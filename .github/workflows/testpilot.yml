name: TestPilot CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"  # 8h EDT (été, UTC-4)
    - cron: "0 13 * * *"  # 8h EST (hiver, UTC-5)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-time:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Vérifier l'heure au Québec
        id: check
        run: |
          HOUR=$(TZ="America/Toronto" date +%H)
          if [ "$HOUR" = "08" ] || [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

  run-tests:
    needs: check-time
    if: needs.check-time.outputs.run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TestPilot
        run: python testpilot.py

      - name: Commit rapport mis à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json historique.json dashboard.html
          git diff --staged --quiet || git commit -m "ci: mise à jour automatique du rapport [skip ci]"
          git push

      - name: Préparer le site GitHub Pages
        run: |
          mkdir -p site
          cp dashboard.html site/index.html

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy-pages:
    needs: run-tests
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
