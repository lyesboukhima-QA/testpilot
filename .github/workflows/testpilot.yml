name: TestPilot CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"  # 8h EDT (été, UTC-4)
    - cron: "0 13 * * *"  # 8h EST (hiver, UTC-5)

jobs:
  check-time:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Vérifier l'heure au Québec
        id: check
        run: |
          HOUR=$(TZ="America/Toronto" date +%H)
          if [ "$HOUR" = "08" ] || [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

  run-tests:
    needs: check-time
    if: needs.check-time.outputs.run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TestPilot
        run: python testpilot.py
